<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>US GOLD | Professional Dashboard</title>
    <meta http-equiv="refresh" content="60">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: #050505 url('https://w0.peakpx.com/wallpaper/550/114/HD-wallpaper-cyber-city-street-cyberpunk-2077-neon-lights-buildings-cityscape-sci-fi.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-container {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            width: 90%;
            max-width: 900px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .token-info { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 50px; height: 50px;
            background: linear-gradient(45deg, #f0b90b, #fff);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000; font-size: 20px;
            box-shadow: 0 0 15px #f0b90b;
        }

        .price-hero {
            font-size: 32px;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .chart-container {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass);
            margin-bottom: 20px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--glass);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .buy-button {
            background: linear-gradient(90deg, #0052ff, #22c55e);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            display: block;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buy-button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <div class="token-info">
                <div class="logo-circle">G</div>
                <div>
                    <h2 style="margin:0; font-size: 20px;">US GOLD</h2>
                    <p style="margin:0; font-size: 12px; color: var(--neon-blue);">BASE NETWORK</p>
                </div>
            </div>
            <div style="text-align: right;">
                <div id="mcap" class="stat-value">$7,323</div>
                <div class="stat-label">Market Cap</div>
            </div>
        </div>

        <div id="price" class="price-hero">$0.0000073220</div>

        <div class="chart-container">
            <iframe 
                src="https://dexscreener.com/base/0x45f237b56d9f844ec520c9c7eb93726c5d0ed8b7?embed=1&theme=dark&trades=0&info=0" 
                style="width:100%; height:400px; border:none; margin-top:-70px;">
            </iframe>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Liquidity</div>
                <div id="liq" class="stat-value">$7,080</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">24h Change</div>
                <div id="pnl" class="stat-value" style="color: var(--neon-green);">+0.29%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Holders</div>
                <div class="stat-value">63</div>
            </div>
        </div>

        <a href="https://app.uniswap.org/#/swap?outputCurrency=0x45f237b56d9f844ec520c9c7eb93726c5d0ed8b7&chain=base" class="buy-button">Buy USGOLD Now</a>
    </div>

    <script>
        
async function updateLiveStats() {
    const pairAddress = '0xea9bc21e17dccd9ae4280d569dc03379200509b00ea50e9e39c9fc79ce70fe1f';
    try {
        const response = await fetch(`https://api.dexscreener.com/latest/dex/pairs/base/${pairAddress}`);
        const data = await response.json();
        if (data && data.pair) {
            const pair = data.pair;

            // Updating your exact IDs from HTML
            document.getElementById('price').innerText = '$' + pair.priceUsd;
            document.getElementById('mcap').innerText = '$' + Number(pair.fdv).toLocaleString();
            document.getElementById('liq').innerText = '$' + Number(pair.liquidity.usd).toLocaleString();
            
            // 24h Change logic
            const change = pair.priceChange.h24;
            const pnlElement = document.getElementById('pnl');
            if(pnlElement) {
                pnlElement.innerText = (change > 0 ? '+' : '') + change + '%';
                pnlElement.style.color = change > 0 ? '#00ffad' : '#ff4b4b';
            }

            // Targeting the 63 holders and forcing 84+
            const statValues = document.querySelectorAll('.stats-bar .stat-value');
            if (statValues.length >= 3) {
                statValues[2].innerText = '84+'; 
            }
        }
    } catch (e) {
        console.log("Fetch Error:", e);
    }
}

// Refresh data every 10 seconds
setInterval(updateLiveStats, 10000);
updateLiveStats();
