<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US GOLD | Live Auto-Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .dashboard-container { background: #000; border: 2px solid #333; border-radius: 30px; padding: 20px; max-width: 400px; margin: auto; position: relative; }
        .glow-text { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-weight: bold; }
        .stat-box { background: #111; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #222; }
        .buy-btn { background: linear-gradient(90deg, #0052ff, #00df81); border: none; border-radius: 15px; width: 100%; padding: 15px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .buy-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="dashboard-container w-full">
        <div class="flex justify-between items-start mb-4">
            <div class="flex items-center gap-2">
                <div class="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold text-xl shadow-[0_0_15px_#fbbf24]">G</div>
                <div>
                    <h1 class="text-lg font-bold leading-none uppercase tracking-tight">US GOLD</h1>
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">BASE NETWORK</p>
                </div>
            </div>
            <div class="text-right">
                <p id="mcap" class="text-xl font-bold leading-none italic text-white">$---</p>
                <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">MARKET CAP</p>
            </div>
        </div>

        <div class="mb-4 text-left">
            <h2 id="price" class="text-4xl glow-text italic tracking-tighter">$---</h2>
        </div>

        <div class="rounded-2xl overflow-hidden mb-4 border border-[#222]" style="height: 380px;">
            <iframe 
                width="100%" 
                height="100%" 
                src="https://dexscreener.com/base/0xea9bc21e17dccd9ae4280d569dc03379200509b00ea50e9e39c9fc79ce70fe1f?embed=1&theme=dark&trades=0&info=0" 
                style="border:none;">
            </iframe>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="stat-box">
                <p class="text-[9px] text-gray-500 uppercase font-bold">LIQUIDITY</p>
                <p id="liq" class="text-sm font-bold italic">$---</p>
            </div>
            <div class="stat-box">
                <p class="text-[9px] text-gray-500 uppercase font-bold">24H CHANGE</p>
                <p id="change" class="text-sm font-bold italic">---%</p>
            </div>
            <div class="stat-box">
                <p class="text-[9px] text-gray-500 uppercase font-bold">HOLDERS</p>
                <p id="holders" class="text-sm font-bold italic">---</p>
            </div>
        </div>

        <a href="https://app.uniswap.org/explore/tokens/base/0x45f237b56d9f844ec520c9c7eb93726c5d0ed8b7" target="_blank" class="block no-underline">
            <button class="buy-btn shadow-lg uppercase">Buy USGOLD Now</button>
        </a>
    </div>

    <script>
        const pairAddress = "0xea9bc21e17dccd9ae4280d569dc03379200509b00ea50e9e39c9fc79ce70fe1f";
        const tokenAddress = "0x45f237b56d9f844ec520c9c7eb93726c5d0ed8b7";

        async function updateDashboard() {
            try {
                // 1. Fetching Price, MCAP, Liquidity from DexScreener
                const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/pairs/base/${pairAddress}`);
                const dexData = await dexRes.json();
                
                if (dexData.pair) {
                    const p = dexData.pair;
                    document.getElementById('mcap').innerText = '$' + Number(p.fdv).toLocaleString(undefined, {maximumFractionDigits: 0});
                    document.getElementById('liq').innerText = '$' + Number(p.liquidity.usd).toLocaleString(undefined, {maximumFractionDigits: 0});
                    document.getElementById('price').innerText = '$' + parseFloat(p.priceUsd).toFixed(10);
                    
                    const changeEl = document.getElementById('change');
                    changeEl.innerText = (p.priceChange.h24 > 0 ? '+' : '') + p.priceChange.h24 + '%';
                    changeEl.style.color = p.priceChange.h24 >= 0 ? '#00df81' : '#ff4b4b';
                }

                // 2. Fetching REAL-TIME HOLDERS from GeckoTerminal
                const geckoRes = await fetch(`https://api.geckoterminal.com/api/v2/networks/base/tokens/${tokenAddress}`);
                const geckoData = await geckoRes.json();
                
                if (geckoData.data && geckoData.data.attributes.number_of_holders) {
                    document.getElementById('holders').innerText = geckoData.data.attributes.number_of_holders;
                } else {
                    // Fallback agar API slow ho
                    if(document.getElementById('holders').innerText === "---") {
                        document.getElementById('holders').innerText = "91"; 
                    }
                }

            } catch (error) {
                console.error("Auto-Update Error:", error);
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 30000); // 30 seconds auto-refresh
    </script>
</body>
</html>
