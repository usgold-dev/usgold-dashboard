<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USGOLD Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fbbf24; font-family: 'Inter', sans-serif; }
        .neon-border { border: 2px solid #fbbf24; box-shadow: 0 0 15px #fbbf24; }
        .neon-text { text-shadow: 0 0 10px #fbbf24; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-bold mb-8 neon-text uppercase tracking-widest text-yellow-500 italic">USGOLD LIVE DASHBOARD</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
            <div class="neon-border p-6 rounded-xl bg-black">
                <p class="text-gray-400 text-sm uppercase">Market Cap</p>
                <h2 id="mcap" class="text-3xl font-bold mt-2 leading-none text-white tracking-tighter italic">$---</h2>
            </div>
            <div class="neon-border p-6 rounded-xl bg-black">
                <p class="text-gray-400 text-sm uppercase">Liquidity</p>
                <h2 id="liq" class="text-3xl font-bold mt-2 leading-none text-white tracking-tighter italic">$---</h2>
            </div>
            <div class="neon-border p-6 rounded-xl bg-black">
                <p class="text-gray-400 text-sm uppercase">Price (USD)</p>
                <h2 id="price" class="text-3xl font-bold mt-2 leading-none text-green-500 tracking-tighter italic">$---</h2>
            </div>
        </div>

        <div class="neon-border rounded-xl overflow-hidden bg-black mb-8" style="height: 550px;">
            <iframe 
                width="100%" 
                height="100%" 
                src="https://dexscreener.com/base/0xea9bc21e17dccd9ae4280d569dc03379200509b00ea50e9e39c9fc79ce70fe1f?embed=1&theme=dark&trades=1&info=0" 
                style="border:none;">
            </iframe>
        </div>

        <a href="https://app.uniswap.org/explore/tokens/base/0x45f237b56d9f844ec520c9c7eb93726c5d0ed8b7" target="_blank" 
           class="inline-block bg-yellow-500 text-black font-black py-4 px-12 rounded-full text-xl hover:bg-yellow-400 transition-all transform hover:scale-105 shadow-lg neon-text">
            BUY $USGOLD ON UNISWAP
        </a>
    </div>

    <script>
        const pairAddress = "0xea9bc21e17dccd9ae4280d569dc03379200509b00ea50e9e39c9fc79ce70fe1f";
        
        async function fetchStats() {
            try {
                const response = await fetch(`https://api.dexscreener.com/latest/dex/pairs/base/${pairAddress}`);
                const data = await response.json();
                
                if (data.pair) {
                    const mcapValue = data.pair.fdv || 0;
                    const liqValue = data.pair.liquidity ? data.pair.liquidity.usd : 0;
                    const priceValue = data.pair.priceUsd || 0;

                    document.getElementById('mcap').innerText = '$' + Number(mcapValue).toLocaleString(undefined, {maximumFractionDigits: 0});
                    document.getElementById('liq').innerText = '$' + Number(liqValue).toLocaleString(undefined, {maximumFractionDigits: 0});
                    document.getElementById('price').innerText = '$' + parseFloat(priceValue).toFixed(8);
                }
            } catch (error) {
                console.error("API Error:", error);
            }
        }

        // Initial fetch
        fetchStats();
        // Auto-update every 20 seconds
        setInterval(fetchStats, 20000);
    </script>
</body>
</html>
